<h2 class="page-title">Hacer un reporte</h2>
<p class="page-subtitle">
  Selecciona el tipo de reporte que deseas registrar.
</p>

<div class="reportes-grid">
  <a class="reporte-card perdido" routerLink="/perdido">
    <h3>Perdí algo</h3>
    <p>
      Reporta un objeto que perdiste dentro de las instalaciones para que
      podamos ayudarte a encontrarlo.
    </p>
  </a>

  <a class="reporte-card encontrado" routerLink="/encontrado">
    <h3>Encontré algo</h3>
    <p>
      Informa sobre un objeto que encontraste para que podamos localizar a su
      dueño.
    </p>
  </a>
</div>
