<div class="form-container">
  <h3>Reportar Objeto Encontrado</h3>
  <p>Completa los campos con los detalles del objeto que encontraste.</p>

  <form (ngSubmit)="enviar()">
    <div class="form-group">
      <label for="titulo">¿Qué encontraste? (Título breve)</label>
      <input id="titulo" name="titulo" type="text" [(ngModel)]="form.titulo" placeholder="Ej: Billetera café" required>
    </div>

    <div class="form-group">
      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" name="descripcion" rows="4"
                [(ngModel)]="form.descripcion" placeholder="Marca, color, contenido, etc."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="ubicacion">¿Dónde lo encontraste?</label>
        <input id="ubicacion" name="ubicacion" [(ngModel)]="form.ubicacion" placeholder="Ej: Cafetería, mesa 4" required>
      </div>
      <div class="form-group">
        <label for="fecha">Fecha</label>
        <input id="fecha" name="fecha" type="date" [(ngModel)]="form.fecha" required>
      </div>
    </div>

    <div class="form-group">
      <label for="categoria">Categoría</label>
      <select id="categoria" name="categoria" [(ngModel)]="form.categoria">
        <option value="">-- Elige una categoría --</option>
        <option value="electronica">Electrónica</option>
        <option value="ropa">Ropa y Accesorios</option>
        <option value="documentos">Documentos</option>
        <option value="libros">Libros y Cuadernos</option>
        <option value="otros">Otros</option>
      </select>
    </div>

    <div class="form-group">
      <label for="foto">Foto (Opcional)</label>
      <input id="foto" name="foto" type="file" accept="image/*" (change)="onFile($event)">
    </div>

    <hr class="form-divider">

    <div class="form-group">
      <label for="contactoNombre">Tu nombre</label>
      <input id="contactoNombre" name="contactoNombre" [(ngModel)]="form.contactoNombre" required>
    </div>
    <div class="form-group">
      <label for="contactoEmail">Correo de contacto</label>
      <input id="contactoEmail" name="contactoEmail" type="email" [(ngModel)]="form.contactoEmail" required>
    </div>

    <div class="form-actions">
      <button type="submit" class="submit-button">Enviar Reporte</button>
    </div>
  </form>
</div>
