<div class="form-container">
  <h3>Crear un Reporte de Objeto Perdido</h3>
  <p>Completa los campos con la mayor cantidad de detalles posible.</p>

  <form (ngSubmit)="enviar()">
    <div class="form-group">
      <label for="reporte-titulo">¿Qué perdiste? (Título breve)</label>
      <input id="reporte-titulo" name="titulo" type="text"
             placeholder="Ej: Mochila negra marca Jansport"
             [(ngModel)]="form.titulo" required>
    </div>

    <div class="form-group">
      <label for="reporte-descripcion">Descripción detallada</label>
      <textarea id="reporte-descripcion" name="descripcion" rows="4"
                placeholder="Describe el objeto, su contenido, marcas distintivas, etc."
                [(ngModel)]="form.descripcion"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="reporte-ubicacion">¿Dónde lo perdiste?</label>
        <input id="reporte-ubicacion" name="ubicacion" type="text"
               placeholder="Ej: Biblioteca, edificio A, 3er piso"
               [(ngModel)]="form.ubicacion" required>
      </div>
      <div class="form-group">
        <label for="reporte-fecha">¿Cuándo lo perdiste?</label>
        <input id="reporte-fecha" name="fecha" type="date"
               [(ngModel)]="form.fecha" required>
      </div>
    </div>

    <div class="form-group">
      <label for="reporte-categoria">Categoría del objeto</label>
      <select id="reporte-categoria" name="categoria" [(ngModel)]="form.categoria">
        <option value="">-- Elige una categoría --</option>
        <option value="electronica">Electrónica</option>
        <option value="ropa">Ropa y Accesorios</option>
        <option value="documentos">Documentos</option>
        <option value="libros">Libros y Cuadernos</option>
        <option value="otros">Otros</option>
      </select>
    </div>

    <div class="form-group">
      <label for="reporte-foto">Sube una foto (Opcional)</label>
      <input id="reporte-foto" name="foto" type="file" accept="image/*" (change)="onFile($event)">
    </div>

    <hr class="form-divider">

    <div class="form-group">
      <label for="contacto-nombre">Tu nombre</label>
      <input id="contacto-nombre" name="contactoNombre" type="text"
             placeholder="Nombre Apellido" [(ngModel)]="form.contactoNombre" required>
    </div>
    <div class="form-group">
      <label for="contacto-email">Correo electrónico de contacto</label>
      <input id="contacto-email" name="contactoEmail" type="email"
             placeholder="tu-correo@ejemplo.com" [(ngModel)]="form.contactoEmail" required>
    </div>

    <div class="form-actions">
      <button type="submit" class="submit-button">Enviar Reporte</button>
    </div>
  </form>
</div>
