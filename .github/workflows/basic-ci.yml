name: Basic CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

jobs:
  backend-validation:
    name: Backend lint and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: LF_BACK

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: LF_BACK/package-lock.json

      - name: Install backend dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run backend tests
        run: npm test

  frontend-validation:
    name: Frontend build validation
    runs-on: ubuntu-latest
    continue-on-error: true  

    defaults:
      run:
        working-directory: LF

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: LF/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build