name: CI-CD Main Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend lint, test and verification
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: LF_BACK

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: LF_BACK/package-lock.json

      - name: Install backend dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run backend tests
        run: npm test

      - name: Generate coverage report
        run: npm run test:coverage

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: LF

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: LF/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: LF/dist